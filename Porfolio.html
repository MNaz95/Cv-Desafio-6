<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="CV.html">Nazaret Gomez</a>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">

    <header>
        <section id="portafolio" class="my-5 p-5 bg-dark bg-gradient">
            <h2 class="display-4 fw-bold text-center text-light mb-5">FrontEnd</h2>

            <div id="carouselPortafolio" class="carousel slide">
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#carouselPortafolio" data-bs-slide-to="0" class="active"
                        aria-current="true" aria-label="Slide 1"></button>
                    <button type="button" data-bs-target="#carouselPortafolio" data-bs-slide-to="1"

                    <button type="button" data-bs-target="#carouselPortafolio" data-bs-slide-to="2"

                    <div class="carousel-item active">

                    <div class="carousel-item">

                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselPortafolio"

                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Anterior</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselPortafolio"
